name: Performance Tracking

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  pull-requests: write

env:
  GO_VERSION: '1.26.0'
  BENCHTIME: 2s
  BENCH_COUNT: 5

jobs:
  benchmark:
    name: Benchmark Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: make ubuntu-deps

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks (current)
        run: |
          go test -tags "fts5" -bench=. -benchmem -benchtime=${{ env.BENCHTIME }} -count=${{ env.BENCH_COUNT }} ./... > new-benchmarks.txt

      - name: Get base branch
        id: base_branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.base_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
          fi

      - name: Run benchmarks (base)
        run: |
          git stash
          git checkout ${{ steps.base_branch.outputs.branch }}
          go test -tags "fts5" -bench=. -benchmem -benchtime=${{ env.BENCHTIME }} -count=${{ env.BENCH_COUNT }} ./... > old-benchmarks.txt

      - name: Compare benchmarks
        id: benchstat
        run: |
          benchstat old-benchmarks.txt new-benchmarks.txt | tee benchstat-output.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          path: |
            old-benchmarks.txt
            new-benchmarks.txt
            benchstat-output.txt
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: benchstat-output.txt
          comment_tag: benchmark_results

  profile:
    name: Generate Profiles
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: benchmark
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: make ubuntu-deps

      - name: Generate profiles
        run: |
          go test -tags "fts5" -bench=BenchmarkSearch -benchtime=10s \
            -cpuprof=cpu.prof -memprof=mem.prof -trace=trace.out \
            ./internal/commands/

      - name: Generate profile SVGs
        run: |
          go tool pprof -svg -output=cpu-profile.svg ./internal/commands/ cpu.prof
          go tool pprof -svg -output=mem-profile.svg ./internal/commands/ mem.prof

      - name: Upload profile artifacts
        uses: actions/upload-artifact@v7
        with:
          path: |
            cpu-profile.svg
            mem-profile.svg
            trace.out
          retention-days: 14
