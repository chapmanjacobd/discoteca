name: CI

on:
  push:
    # branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  ci:
    name: Continuous Integration
    runs-on: ${{ matrix.os }}
    env:
      BUILD_TAGS: fts5
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            e2e/package-lock.json

      - name: Install system dependencies
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            make ubuntu-deps
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            make macos-deps
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            choco install sqlite ffmpeg zip
          fi

      - name: Install Go and Web dependencies
        run: |
          make go-deps
          make web-install

      - name: Run checks and build
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows often has issues with parallel tests and file locking on SQLite DBs
            go test -tags "${BUILD_TAGS}" -parallel 1 ./...
            make all
          else
            make all
          fi

      - name: Install E2E dependencies
        if: matrix.os == 'ubuntu-latest'
        run: make e2e-install

      - name: Run Playwright tests
        if: matrix.os == 'ubuntu-latest'
        run: make e2e
        env:
          DISCO_BINARY: ${{ github.workspace }}/disco
          DISCO_BASE_URL: http://localhost:8080
          CI: true

      - name: Run benchmarks
        if: matrix.os == 'ubuntu-latest'
        run: |
          go test -tags "${BUILD_TAGS}" -bench=. -benchmem -benchtime=1s ./... > benchmark-results.txt
          cat benchmark-results.txt

      - name: Upload benchmark results
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: benchmark-results.txt
          retention-days: 30
          archive: false

      - name: Run benchmarks with CPU profiling
        if: matrix.os == 'ubuntu-latest'
        run: |
          go test -tags "${BUILD_TAGS}" -bench=BenchmarkSearch -cpuprof=cpu.prof -memprof=mem.prof -benchtime=5s ./internal/commands/
          go tool pprof -svg -output=cpu-profile.svg ./internal/commands/ cpu.prof
          go tool pprof -svg -output=mem-profile.svg ./internal/commands/ mem.prof

      - name: Upload profile data
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: |
            cpu-profile.svg
            mem-profile.svg
          retention-days: 7
          archive: false

      - name: Upload test results
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

      - name: Upload HTML report
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-html-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Build release binary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            make release-build GOOS=darwin GOARCH=amd64
            make release-build GOOS=darwin GOARCH=arm64
            cd dist
            tar -czf disco-darwin-amd64.tar.gz disco-darwin-amd64
            tar -czf disco-darwin-arm64.tar.gz disco-darwin-arm64
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            make release-build GOOS=windows GOARCH=amd64
            cd dist
            zip disco-windows-amd64.zip disco-windows-amd64.exe
          else
            make release-build GOOS=linux GOARCH=amd64
            cd dist
            tar -czf disco-linux-amd64.tar.gz disco-linux-amd64
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "discoteca ${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            --repo ${{ github.repository }} || true

      - name: Upload binaries to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            dist/disco-* \
            --repo ${{ github.repository }}
